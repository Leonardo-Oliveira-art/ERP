<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - ERP</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsivo.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Entrar</h1>
      <p class="sub">Acesse com seu email e senha</p>

      <form id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input class="input" type="email" id="email" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input class="input" type="password" id="senha" required />
        </div>
        <button class="btn btn-block" type="submit">Entrar</button>
      </form>

      <div style="margin-top:16px; display:flex; justify-content:space-between; font-size:13px;">
        <a href="#" id="link-recuperar">Esqueci minha senha</a>
        <a href="#" id="link-cadastro">Criar conta</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
