<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP - Início</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card" style="text-align:center;">
      <h1>Sistema ERP</h1>
      <p class="sub">Gestão para sua revenda</p>
      <a class="btn btn-block" href="login.html">Entrar no sistema</a>
    </div>
  </div>
  <script>
    // Se já estiver logado, encaminha direto ao dashboard
    (async () => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
      s.onload = async () => {
        const c = document.createElement("script"); c.src = "js/config.js";
        c.onload = async () => {
          const { data } = await supabase.auth.getUser();
          if (data.user) window.location.href = "dashboard.html";
        };
        document.body.appendChild(c);
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
