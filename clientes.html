<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clientes - ERP</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsivo.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><img src="assets/logo.png" alt="" onerror="this.style.display='none'"/><span>ERP</span></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="produtos.html">Produtos</a>
        <a href="estoque.html">Estoque</a>
        <a href="clientes.html" class="active">Clientes</a>
        <a href="pedidos.html">Pedidos</a>
        <a href="cobrancas.html">Cobranças</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="configuracoes.html">Configurações</a>
      </nav>
      <div class="sidebar-footer"><button onclick="logout()">Sair</button></div>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1>Clientes</h1>
        <button class="btn" onclick="abrirModalCliente()">+ Novo cliente</button>
      </div>

      <div class="card">
        <div class="toolbar">
          <input class="input" id="busca" placeholder="Buscar por nome, CPF/CNPJ, cidade..." />
          <button class="btn btn-secondary" onclick="window.print()">Imprimir</button>
        </div>
        <div class="table-wrap">
          <table class="data">
            <thead><tr><th>Nome</th><th>CPF/CNPJ</th><th>Telefone</th><th>Cidade</th><th class="actions-col"></th></tr></thead>
            <tbody id="lista"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modal-cliente">
    <div class="modal">
      <div class="modal-head"><h3 id="modal-titulo">Novo cliente</h3><button onclick="fecharModal('modal-cliente')">×</button></div>
      <div class="modal-body">
        <form id="form-cliente">
          <input type="hidden" id="c-id" />
          <div class="form-group"><label>Nome *</label><input class="input" id="c-nome" required/></div>
          <div class="form-row">
            <div class="form-group"><label>CPF/CNPJ</label><input class="input" id="c-doc"/></div>
            <div class="form-group"><label>Email</label><input class="input" type="email" id="c-email"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Telefone</label><input class="input" id="c-tel"/></div>
            <div class="form-group"><label>WhatsApp</label><input class="input" id="c-wpp"/></div>
          </div>
          <div class="form-group"><label>Endereço</label><input class="input" id="c-end"/></div>
          <div class="form-row">
            <div class="form-group"><label>Cidade</label><input class="input" id="c-cid"/></div>
            <div class="form-group"><label>Estado</label><input class="input" id="c-uf" maxlength="2"/></div>
          </div>
          <div class="form-group"><label>Observações</label><textarea id="c-obs" rows="2"></textarea></div>
        </form>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="fecharModal('modal-cliente')">Cancelar</button>
        <button class="btn" onclick="salvarCliente()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/clientes.js"></script>
</body>
</html>
