<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produtos - ERP</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsivo.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><img src="assets/logo.png" alt="" onerror="this.style.display='none'"/><span>ERP</span></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="produtos.html" class="active">Produtos</a>
        <a href="estoque.html">Estoque</a>
        <a href="clientes.html">Clientes</a>
        <a href="pedidos.html">Pedidos</a>
        <a href="cobrancas.html">Cobranças</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="configuracoes.html">Configurações</a>
      </nav>
      <div class="sidebar-footer"><button onclick="logout()">Sair</button></div>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1>Produtos</h1>
        <button class="btn" onclick="abrirModalProduto()">+ Novo produto</button>
      </div>

      <div class="card">
        <div class="toolbar">
          <input class="input" id="busca" placeholder="Buscar por nome, código, categoria, código de barras..." />
          <button class="btn btn-secondary" onclick="window.print()">Imprimir</button>
        </div>
        <div class="table-wrap">
          <table class="data">
            <thead><tr>
              <th>Código</th><th>Nome</th><th>Categoria</th>
              <th>Preço venda</th><th>Estoque</th><th class="actions-col"></th>
            </tr></thead>
            <tbody id="lista"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal produto -->
  <div class="modal-backdrop" id="modal-produto">
    <div class="modal">
      <div class="modal-head"><h3 id="modal-titulo">Novo produto</h3><button onclick="fecharModal('modal-produto')">×</button></div>
      <div class="modal-body">
        <form id="form-produto">
          <input type="hidden" id="p-id" />
          <div class="form-row">
            <div class="form-group"><label>Código</label><input class="input" id="p-codigo" /></div>
            <div class="form-group"><label>Código de barras</label><input class="input" id="p-barras" /></div>
          </div>
          <div class="form-group"><label>Nome *</label><input class="input" id="p-nome" required /></div>
          <div class="form-row">
            <div class="form-group"><label>Categoria</label><input class="input" id="p-categoria" /></div>
            <div class="form-group"><label>Imagem</label><input class="input" type="file" id="p-imagem" accept="image/*"/></div>
          </div>
          <div class="form-group"><label>Descrição</label><textarea id="p-descricao" rows="2"></textarea></div>
          <div class="form-row-3">
            <div class="form-group"><label>Preço custo</label><input class="input" type="number" step="0.01" id="p-custo" /></div>
            <div class="form-group"><label>Preço venda</label><input class="input" type="number" step="0.01" id="p-venda" /></div>
            <div class="form-group"><label>Quantidade</label><input class="input" type="number" step="0.001" id="p-qtd" /></div>
          </div>
          <div class="form-group"><label>Estoque mínimo</label><input class="input" type="number" step="0.001" id="p-min" /></div>
        </form>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="fecharModal('modal-produto')">Cancelar</button>
        <button class="btn" onclick="salvarProduto()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/produtos.js"></script>
</body>
</html>
