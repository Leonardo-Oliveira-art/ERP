<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Estoque - ERP</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsivo.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><img src="assets/logo.png" alt="" onerror="this.style.display='none'"/><span>ERP</span></div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="produtos.html">Produtos</a>
        <a href="estoque.html" class="active">Estoque</a>
        <a href="clientes.html">Clientes</a>
        <a href="pedidos.html">Pedidos</a>
        <a href="cobrancas.html">Cobranças</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="configuracoes.html">Configurações</a>
      </nav>
      <div class="sidebar-footer"><button onclick="logout()">Sair</button></div>
    </aside>

    <main class="content">
      <div class="topbar">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1>Controle de Estoque</h1>
      </div>

      <div class="card">
        <h2>Nova movimentação</h2>
        <div class="form-row-3">
          <div class="form-group"><label>Produto</label><select class="input" id="mov-prod"></select></div>
          <div class="form-group"><label>Tipo</label>
            <select class="input" id="mov-tipo">
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
              <option value="ajuste">Ajuste (define valor absoluto)</option>
            </select>
          </div>
          <div class="form-group"><label>Quantidade</label><input class="input" type="number" step="0.001" id="mov-qtd"/></div>
        </div>
        <div class="form-group"><label>Observação</label><input class="input" id="mov-obs"/></div>
        <button class="btn" onclick="salvarMov()">Registrar</button>
      </div>

      <div class="card">
        <h2>Produtos com estoque baixo</h2>
        <div class="table-wrap"><table class="data">
          <thead><tr><th>Produto</th><th>Estoque atual</th><th>Mínimo</th></tr></thead>
          <tbody id="baixo"></tbody>
        </table></div>
      </div>

      <div class="card">
        <h2>Histórico de movimentações</h2>
        <div class="table-wrap"><table class="data">
          <thead><tr><th>Data</th><th>Produto</th><th>Tipo</th><th>Qtd</th><th>Obs</th></tr></thead>
          <tbody id="hist"></tbody>
        </table></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/estoque.js"></script>
</body>
</html>
